const DEFAULT_CATEGORIES = ["Work","Personal","Accounts","Powis","Holland","Birchfields","Jumeirah","Baby","Fruitbloom","Portfolio","Braindump"];
const CAT_ICONS = { Work:"WRK", Personal:"PRS", Accounts:"ACC", Powis:"PWS", Holland:"HOL", Birchfields:"BCH", Jumeirah:"JUM", Baby:"BBY", Fruitbloom:"FBL", Portfolio:"PRT", Braindump:"BDP" };
const mono = "'Share Tech Mono','Courier New',monospace";

function daysUntil(d) {
  if (!d) return null;
  return Math.ceil((new Date(d) - new Date()) / 86400000);
}

function DeadlineBadge({ d }) {
  const days = daysUntil(d);
  if (days === null) return null;
  const label = days < 0 ? "overdue" : days === 0 ? "today" : `${days} days`;
  return <span style={{ fontFamily:mono, fontSize:10, fontWeight:700, color:"#999999", border:"1px solid #D0D0D0", padding:"1px 7px", letterSpacing:1 }}>{label}</span>;
}

function generateSteps(title, category) {
  const t = title.toLowerCase();
  if (/schedule|programme|roadmap|launch|plan|timeline|milestone/.test(t)) return ["Agree a target launch or completion date","Define key milestones and deliverables","Identify go/no-go decision points","Break milestones into primary and secondary tasks with owners","Map dependencies and linked tasks","Review feasibility and confirm date is realistic"];
  if (/buy|purchas|order|shop|gift|ring|jewel|watch|cloth|trouser|belt|suit|dress/.test(t)) return ["Define exactly what you are looking for and budget","Research options and shortlist top 3 choices","Visit or browse to compare in person or online","Make the purchase","Confirm delivery or collection and keep receipt"];
  if (/call|discuss|speak|catch.?up|meeting|chat|talk|contact|reach.?out/.test(t)) return ["Confirm a convenient time with the other person","Prepare key points or agenda for the conversation","Make the call or attend the meeting","Note any actions or decisions agreed","Follow up on any commitments made"];
  if (/shower|party|event|celebrat|organis|gather|occasion|wedding|engag/.test(t)) return ["Agree date, time and venue with key people","Create guest list and send invitations","Plan food, drinks and any decorations","Arrange any gifts, activities or entertainment","Confirm all bookings and communicate final details"];
  if (/pay|payment|invoice|tax|budget|savings|finance|fund|pension|accountant/.test(t)) return ["Gather all relevant financial documents and references","Confirm the exact amount and payment details","Make the payment or transfer","Save confirmation and update financial records","Set reminder for next payment or review date"];
  if (/contract|lease|legal|register|sign|solicitor|agreement|extension/.test(t)) return ["Review all documents and confirm terms are correct","Identify all required signatures and parties","Execute the agreement and obtain signed copies","File originals and distribute copies to all parties","Update relevant records and set review/renewal reminder"];
  if (/insur|policy|cover|protection|churchill/.test(t)) return ["Identify current policy details and coverage gaps","Get at least 3 comparison quotes","Select the best value policy for your needs","Purchase policy and save all documents","Set renewal reminder and share details with relevant parties"];
  if (/repair|renovate|refurb|facade|build|construct|install|plumb|electr/.test(t)) return ["Define full scope of works required","Get minimum 3 contractor quotes","Check credentials and references of preferred contractor","Agree start date, timeline and payment schedule","Supervise works and sign off on completion"];
  if (/hand.?over|handover|agent|letting|rental|tenant|knight frank/.test(t)) return ["Prepare all property documents and certificates","Brief agent on property details and requirements","Agree terms, fees and management scope","Sign contract and transfer keys","Set up communication process for ongoing management"];
  if (/cv|resume|job|application|interview|career|apply|recruit/.test(t)) return ["Update CV with latest experience and achievements","Tailor CV and covering letter to the specific role","Research the organisation and role requirements","Submit application via correct channel","Follow up if no response within 2 weeks"];
  if (/book|appoint|doctor|physio|dentist|medical|health|clinic|hospital/.test(t)) return ["Find the correct contact number or booking link","Call or book online at earliest availability","Confirm appointment details and add to calendar","Prepare any relevant notes or questions beforehand","Attend and follow up on any recommendations"];
  if (/strateg|business|struct|concept|brand|market|sales|distribut|manufactur/.test(t)) return ["Define the objective and desired outcome clearly","Research best practice and competitor approaches","Draft initial framework or structure","Review with key stakeholders and refine","Finalise and agree implementation plan with timeline"];
  if (/register|company|website|domain|set.?up|incorporat/.test(t)) return ["Research requirements and choose the right vehicle","Gather all required information and documents","Complete registration process","Confirm registration and save all documentation","Set up any linked accounts or services needed"];
  if (/research|source|find|identify|investigat|compare|shortlist/.test(t)) return ["Define exactly what you are looking for and success criteria","Identify 3-5 potential options or sources","Evaluate each option against your criteria","Select the best option and note reasons","Proceed with next action based on findings"];
  if (/transfer|move|organis|sort|complet|action|close.?out/.test(t)) return ["Confirm all details and prerequisites are in place","Take the primary action required","Verify the action has been completed correctly","Notify any relevant parties","File confirmation and update records"];
  const catSteps = {
    "Work":        ["Define the goal and deliverable clearly","Research and gather required information","Draft or execute the work","Review and quality check","Submit or deliver and follow up"],
    "Personal":    ["Set a specific date to complete this","Gather what you need to get started","Take the first action","Complete remaining steps","Confirm done and move on"],
    "Accounts":    ["Gather all relevant financial information","Confirm amounts, references and account details","Execute the payment or transaction","Save confirmation and receipt","Update records and set next reminder"],
    "Powis":       ["Confirm current status of the issue","Identify what action is needed","Take or arrange the action","Confirm completion with any relevant parties","Update records and file confirmation"],
    "Holland":     ["Confirm current status of the issue","Identify contractor or party needed","Agree scope, cost and timing","Execute the action","Confirm completion and update records"],
    "Birchfields": ["Review current compliance status","Identify any gaps or risks","Take corrective action","Confirm completion with relevant parties","Update records and set next review"],
    "Jumeirah":    ["Confirm what is needed and by when","Gather required documents or materials","Complete the primary action","Verify completion","Update records and notify relevant parties"],
    "Baby":        ["Research the best option","Order or book as required","Confirm delivery or appointment","Prepare or set up as needed","Mark complete"],
    "Fruitbloom":  ["Define the objective for this task","Research best practice in this area","Draft an initial approach or plan","Review and refine","Agree next steps and implement"],
    "Portfolio":   ["Gather relevant financial and legal information","Consult with advisor if required","Evaluate options against objectives","Make a decision and take action","Document and file outcome"],
    "Braindump":   ["Research this topic further","Decide if and when to act","Define the first action if proceeding","Schedule time to complete it","Review outcome"],
  };
  return catSteps[category] || ["Define what done looks like for this task","Identify the first action needed","Complete the primary action","Review and confirm it is done correctly","File or communicate the outcome"];
}

function TaskModal({ task, defaultCat, categories, onCategoriesChange, onRenameCategory, allTasks, onSave, onDelete, onClose }) {
  const isEdit = !!task;
  const [form, setForm] = useState(isEdit ? {
    title:task.title, category:task.category, urgency:task.urgency,
    deadline:task.deadline||"", blocker:task.blocker||"",
    involved:Array.isArray(task.involved)?task.involved.join(", "):(task.involved||""),
    linked:Array.isArray(task.linked)?task.linked.join(", "):(task.linked||""),
  } : { title:"", category:defaultCat||categories[0], urgency:"amber", deadline:"", blocker:"", involved:"", linked:"" });
  const [steps, setSteps] = useState(isEdit ? task.subactions.map(s=>({...s})) : []);
  const [newStep, setNewStep] = useState("");
  const [linkedInput, setLinkedInput] = useState("");
  const [confirmDelete, setConfirmDelete] = useState(false);
  const [catMode, setCatMode] = useState(null);
  const [catInput, setCatInput] = useState("");
  const [renamingCat, setRenamingCat] = useState("");

  function addCategory() {
    const name = catInput.trim();
    if (!name || categories.includes(name)) return;
    onCategoriesChange([...categories, name]);
    setForm(p=>({...p, category:name}));
    setCatMode(null);
    setCatInput("");
  }

  function renameCategory() {
    const name = catInput.trim();
    if (!name || name === renamingCat) { setCatMode(null); return; }
    onCategoriesChange(categories.map(c => c===renamingCat ? name : c));
    onRenameCategory(renamingCat, name);
    setForm(p=>({...p, category: p.category===renamingCat ? name : p.category}));
    setCatMode(null);
    setCatInput("");
    setRenamingCat("");
  }

  function breakdown(titleOverride) {
    const title = (titleOverride !== undefined ? titleOverride : form.title).trim();
    if (!title) return;
    const generated = generateSteps(title, form.category);
    setSteps(generated.map((s,i) => ({ id: Date.now()+i+1, text: s, done: false })));
  }

  function handleTitleBlur() {
    if (!isEdit && form.title.trim() && steps.length === 0) {
      breakdown(form.title);
    }
  }

  function submit() {
    if (!form.title.trim()) return;
    onSave({
      ...(isEdit ? task : { id:Date.now(), done:false, blockerSuggestion:"" }),
      ...form,
      involved: form.involved ? form.involved.split(",").map(s=>s.trim()).filter(Boolean) : [],
      linked: form.linked ? form.linked.split(",").map(s=>s.trim()).filter(Boolean) : [],
      subactions: steps,
    });
  }

  const inp = { width:"100%", background:"#FFF", border:"1px solid #D0D0D0", padding:"9px 11px", color:"#1A1A1A", fontSize:13, fontFamily:mono, boxSizing:"border-box", outline:"none", marginBottom:10, borderRadius:0 };
  const lbl = { fontSize:10, color:"#999999", marginBottom:4, display:"block", fontWeight:700, textTransform:"uppercase", letterSpacing:2, fontFamily:mono };

  return (
    <div style={{ position:"fixed", inset:0, background:"rgba(255,255,255,0.95)", zIndex:300, display:"flex", alignItems:"flex-end" }}
      onClick={e => e.target===e.currentTarget && onClose()}>
      <div style={{ background:"#FFFFFF", borderTop:"1px solid #D0D0D0", width:"100%", maxWidth:430, margin:"0 auto", maxHeight:"92vh", overflowY:"auto", padding:"18px 16px 44px" }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:18, borderBottom:"1px solid #D0D0D0", paddingBottom:14 }}>
          <span style={{ fontFamily:mono, fontSize:11, color:"#AAAAAA", letterSpacing:3 }}>{isEdit ? "// EDIT ACTION" : "// NEW ACTION"}</span>
          <button onClick={onClose} style={{ background:"none", border:"1px solid #D0D0D0", color:"#999999", width:26, height:26, cursor:"pointer", fontFamily:mono, fontSize:14, display:"flex", alignItems:"center", justifyContent:"center" }}>x</button>
        </div>

        <label style={lbl}>Task description</label>
        <input style={inp} placeholder="What needs to be done?" value={form.title}
          onChange={e=>setForm(p=>({...p,title:e.target.value}))}
          onBlur={handleTitleBlur} autoFocus/>

        {!isEdit && form.title.trim() && steps.length === 0 && (
          <button onClick={()=>breakdown(form.title)} style={{ width:"100%", padding:"11px", background:"#1A1A1A", border:"none", color:"#FFFFFF", fontSize:11, fontWeight:700, cursor:"pointer", fontFamily:mono, letterSpacing:2, marginBottom:10 }}>
            GENERATE STEPS
          </button>
        )}

        <label style={lbl}>Category</label>
        {catMode === "add" ? (
          <div style={{ display:"flex", gap:6, marginBottom:10 }}>
            <input style={{...inp, marginBottom:0, flex:1}} placeholder="New category name" value={catInput}
              onChange={e=>setCatInput(e.target.value)}
              onKeyDown={e=>e.key==="Enter" && addCategory()} autoFocus/>
            <button onClick={addCategory} style={{ background:"#1A1A1A", border:"none", color:"#FFF", padding:"0 12px", cursor:"pointer", fontFamily:mono, fontSize:11 }}>ADD</button>
            <button onClick={()=>{setCatMode(null);setCatInput("");}} style={{ background:"transparent", border:"1px solid #D0D0D0", color:"#999", padding:"0 10px", cursor:"pointer", fontFamily:mono, fontSize:11 }}>x</button>
          </div>
        ) : catMode === "rename" ? (
          <div style={{ display:"flex", gap:6, marginBottom:10 }}>
            <input style={{...inp, marginBottom:0, flex:1}} placeholder={"Rename: " + renamingCat} value={catInput}
              onChange={e=>setCatInput(e.target.value)}
              onKeyDown={e=>e.key==="Enter" && renameCategory()} autoFocus/>
            <button onClick={renameCategory} style={{ background:"#1A1A1A", border:"none", color:"#FFF", padding:"0 12px", cursor:"pointer", fontFamily:mono, fontSize:11 }}>SAVE</button>
            <button onClick={()=>{setCatMode(null);setCatInput("");setRenamingCat("");}} style={{ background:"transparent", border:"1px solid #D0D0D0", color:"#999", padding:"0 10px", cursor:"pointer", fontFamily:mono, fontSize:11 }}>x</button>
          </div>
        ) : (
          <div style={{ display:"flex", gap:6, marginBottom:10 }}>
            <select style={{...inp, marginBottom:0, flex:1, appearance:"none"}} value={form.category}
              onChange={e=>setForm(p=>({...p,category:e.target.value}))}>
              {categories.map(c=><option key={c}>{c}</option>)}
            </select>
            <button onClick={()=>{setCatMode("rename");setRenamingCat(form.category);setCatInput(form.category);}}
              style={{ background:"transparent", border:"1px solid #D0D0D0", color:"#999", padding:"0 10px", cursor:"pointer", fontFamily:mono, fontSize:9, letterSpacing:1, whiteSpace:"nowrap" }}>REN</button>
            <button onClick={()=>setCatMode("add")}
              style={{ background:"transparent", border:"1px solid #D0D0D0", color:"#999", padding:"0 10px", cursor:"pointer", fontFamily:mono, fontSize:16, lineHeight:1 }}>+</button>
          </div>
        )}

        <label style={lbl}>Priority</label>
        <div style={{ display:"flex", gap:6, marginBottom:12 }}>
          {Object.entries(URGENCY).map(([k,v])=>(
            <button key={k} onClick={()=>setForm(p=>({...p,urgency:k}))}
              style={{ flex:1, padding:"7px 4px", background:form.urgency===k?v.color:"transparent", border:`1px solid ${form.urgency===k?v.color:"#D0D0D0"}`, color:form.urgency===k?"#FFF":"#999", fontSize:10, fontWeight:900, cursor:"pointer", fontFamily:mono, letterSpacing:1 }}>
              {v.label}
            </button>
          ))}
        </div>

        <label style={lbl}>Deadline</label>
        <input type="date" style={{...inp, appearance:"none", WebkitAppearance:"none"}} value={form.deadline} onChange={e=>setForm(p=>({...p,deadline:e.target.value}))}/>

        <label style={lbl}>Blocker</label>
        <input style={inp} placeholder="What is stopping progress?" value={form.blocker} onChange={e=>setForm(p=>({...p,blocker:e.target.value}))}/>

        <label style={lbl}>Others involved</label>
        <input style={inp} placeholder="e.g. Caro, Accountant" value={form.involved} onChange={e=>setForm(p=>({...p,involved:e.target.value}))}/>

        <label style={lbl}>Linked tasks</label>
        {(()=>{
          const catTasks = allTasks.filter(t => t.id !== (task && task.id));
          const linkedArr = form.linked ? form.linked.split(",").map(s=>s.trim()).filter(Boolean) : [];
          function shorten(title) {
            const filler = new Set(["a","an","the","to","of","for","and","or","in","on","at","by","with","from","up","is","be","as","it","its","this","that","are","was","were","do","done","has","have","per","re","via","vs","into","onto","out","over","under","about","than","then","when","which","who","how","what","where","any","all","each","if","but","not","no","new","get","set","put","make","take","keep","give","go","run","use","add","see"]);
            const keywords = title.split(" ").filter(w => w.length > 1 && !filler.has(w.toLowerCase()));
            return keywords.slice(0,3).join(" ") || title.split(" ").slice(0,3).join(" ");
          }
          return (
            <div style={{ marginBottom:10 }}>
              {linkedArr.length > 0 && (
                <div style={{ display:"flex", flexWrap:"wrap", gap:6, marginBottom:8 }}>
                  {linkedArr.map((l,i) => (
                    <span key={i} style={{ fontFamily:mono, fontSize:11, color:"#1A1A1A", border:"1px solid #D0D0D0", padding:"3px 8px", display:"flex", alignItems:"center", gap:6 }}>
                      {shorten(l)}
                      <button onClick={()=>setForm(p=>({...p, linked:linkedArr.filter((_,j)=>j!==i).join(", ")}))}
                        style={{ background:"none", border:"none", color:"#AAAAAA", cursor:"pointer", padding:0, fontSize:13, lineHeight:1 }}>x</button>
                    </span>
                  ))}
                </div>
              )}
              <select
                style={{...inp, marginBottom:6, appearance:"none", color:"#999"}}
                value=""
                onChange={e=>{
                  const val = e.target.value;
                  if (!val) return;
                  if (!linkedArr.includes(val)) setForm(p=>({...p, linked:[...linkedArr, val].join(", ")}));
                }}>
                <option value="">Select a related task...</option>
                {catTasks.filter(t=>t.category===form.category&&!linkedArr.includes(t.title)).map(t=>(
                  <option key={t.id} value={t.title}>{shorten(t.title)}</option>
                ))}
                {catTasks.filter(t=>t.category!==form.category&&!linkedArr.includes(t.title)).length > 0 && (
                  <option disabled>── Other categories ──</option>
                )}
                {catTasks.filter(t=>t.category!==form.category&&!linkedArr.includes(t.title)).map(t=>(
                  <option key={t.id} value={t.title}>{t.category}: {shorten(t.title)}</option>
                ))}
              </select>
              <input
                style={{...inp, marginBottom:0}}
                placeholder="And/or type a linked task name"
                value={linkedInput}
                onChange={e=>setLinkedInput(e.target.value)}
                onKeyDown={e=>{
                  if (e.key==="Enter" && linkedInput.trim()) {
                    const val = linkedInput.trim();
                    if (!linkedArr.includes(val)) setForm(p=>({...p, linked:[...linkedArr, val].join(", ")}));
                    setLinkedInput("");
                  }
                }}
              />
              {linkedInput.trim() && (
                <button onClick={()=>{
                  const val = linkedInput.trim();
                  if (!linkedArr.includes(val)) setForm(p=>({...p, linked:[...linkedArr, val].join(", ")}));
                  setLinkedInput("");
                }} style={{ width:"100%", padding:"8px", background:"transparent", border:"1px solid #D0D0D0", color:"#1A1A1A", fontSize:11, cursor:"pointer", fontFamily:mono, letterSpacing:1, marginTop:6 }}>
                  + ADD "{linkedInput.trim()}"
                </button>
              )}
            </div>
          );
        })()}

        <div style={{ marginTop:8, marginBottom:4 }}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8 }}>
            <span style={lbl}>Steps {steps.length > 0 ? "(" + steps.length + ")" : ""}</span>
            {form.title && steps.length > 0 && (
              <button onClick={()=>breakdown()} style={{ background:"transparent", border:"1px solid #D0D0D0", color:"#999", padding:"4px 10px", fontSize:10, cursor:"pointer", fontFamily:mono, letterSpacing:1 }}>REGENERATE</button>
            )}
          </div>
          {steps.map((s,i)=>(
            <div key={s.id} style={{ display:"flex", gap:8, alignItems:"center", marginBottom:4 }}>
              <span style={{ fontFamily:mono, fontSize:10, color:"#CCC", minWidth:18, flexShrink:0 }}>{String(i+1).padStart(2,"0")}</span>
              <input value={s.text} onChange={e=>setSteps(p=>p.map(x=>x.id===s.id?{...x,text:e.target.value}:x))}
                style={{ ...inp, marginBottom:0, flex:1, fontSize:12, padding:"7px 10px" }}/>
              <button onClick={()=>setSteps(p=>p.filter(x=>x.id!==s.id))}
                style={{ background:"none", border:"none", color:"#CCC", cursor:"pointer", fontSize:16, padding:"0 4px", flexShrink:0, lineHeight:1 }}>x</button>
            </div>
          ))}
          <div style={{ display:"flex", gap:6, marginTop:6 }}>
            <input value={newStep} onChange={e=>setNewStep(e.target.value)}
              onKeyDown={e=>{if(e.key==="Enter"&&newStep.trim()){setSteps(p=>[...p,{id:Date.now(),text:newStep.trim(),done:false}]);setNewStep("");}}}
              placeholder="Add a step manually" style={{ ...inp, marginBottom:0, flex:1, fontSize:12, padding:"7px 10px", borderStyle:"dashed" }}/>
            <button onClick={()=>{if(newStep.trim()){setSteps(p=>[...p,{id:Date.now(),text:newStep.trim(),done:false}]);setNewStep("");}}}
              style={{ background:"transparent", border:"1px dashed #D0D0D0", color:"#AAA", padding:"7px 12px", fontSize:18, cursor:"pointer", fontFamily:mono, flexShrink:0 }}>+</button>
          </div>
        </div>

        <button onClick={submit} disabled={!form.title.trim()}
          style={{ width:"100%", padding:"12px", background:form.title.trim()?"#1A1A1A":"#F0F0F0", border:"none", color:form.title.trim()?"#FFF":"#CCC", fontSize:11, fontWeight:900, cursor:"pointer", fontFamily:mono, letterSpacing:3, marginTop:14, marginBottom:8 }}>
          {isEdit ? "SAVE CHANGES" : "CONFIRM ACTION"}
        </button>

        {isEdit && (confirmDelete ? (
          <div style={{ border:"1px solid #FF2A00", padding:"12px 14px", marginBottom:8 }}>
            <div style={{ fontFamily:mono, fontSize:10, color:"#FF2A00", letterSpacing:2, marginBottom:10 }}>CONFIRM DELETE?</div>
            <div style={{ display:"flex", gap:8 }}>
              <button onClick={()=>onDelete(task.id)} style={{ flex:1, padding:"10px", background:"#FF2A00", border:"none", color:"#fff", fontSize:11, fontWeight:900, cursor:"pointer", fontFamily:mono, letterSpacing:2 }}>DELETE</button>
              <button onClick={()=>setConfirmDelete(false)} style={{ flex:1, padding:"10px", background:"transparent", border:"1px solid #D0D0D0", color:"#999", fontSize:11, cursor:"pointer", fontFamily:mono, letterSpacing:2 }}>CANCEL</button>
            </div>
          </div>
        ) : (
          <button onClick={()=>setConfirmDelete(true)} style={{ width:"100%", padding:"11px", background:"transparent", border:"1px solid rgba(255,42,0,0.3)", color:"#FF2A00", fontSize:11, cursor:"pointer", fontFamily:mono, letterSpacing:2, marginBottom:8 }}>DELETE ACTION</button>
        ))}

        <button onClick={onClose} style={{ width:"100%", padding:"10px", background:"transparent", border:"1px solid #D0D0D0", color:"#AAA", fontSize:11, cursor:"pointer", fontFamily:mono, letterSpacing:2 }}>CANCEL</button>
      </div>
    </div>
  );
}

function DetailView({ taskId, tasks, onBack, onToggle, onEdit, onDelete }) {
  const [aiLoading, setAiLoading] = useState(false);
  const [advice, setAdvice] = useState(null);
  const task = tasks.find(t => t.id === taskId);
  if (!task) return null;
  const doneN = task.subactions.filter(s=>s.done).length;
  const pct = task.subactions.length ? doneN/task.subactions.length : 0;
  const tip = advice || task.blockerSuggestion;
  const u = URGENCY[task.urgency];

  async function getAdvice() {
    setAiLoading(true);
    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method:"POST", headers:{"Content-Type":"application/json"},
        body: JSON.stringify({ model:"claude-sonnet-4-20250514", max_tokens:300,
          messages:[{role:"user",content:`Life coach. Task: "${task.title}". Blocker: "${task.blocker}". ONE sharp workaround, 2 sentences max. No preamble.`}]})
      });
      const d = await res.json();
      setAdvice(d.content.map(i=>i.text||"").join(""));
    } catch(e){}
    setAiLoading(false);
  }

  return (
    <div style={{ padding:"52px 0 40px" }}>
      <div style={{ padding:"0 16px 12px", borderBottom:"1px solid #2A2A2A", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
        <button onClick={onBack} style={{ background:"none", border:"none", color:"#888888", cursor:"pointer", fontFamily:mono, fontSize:11, letterSpacing:2, padding:0 }}>← BACK</button>
        <div style={{ display:"flex", gap:10, alignItems:"center" }}>
          <span style={{ fontFamily:mono, fontSize:10, color:u.color, letterSpacing:2 }}>{u.label}</span>
          <button onClick={()=>onEdit(task)} style={{ background:"transparent", border:"1px solid #D0D0D0", color:"#555555", padding:"4px 10px", fontSize:11, cursor:"pointer", fontFamily:mono, letterSpacing:2 }}>EDIT</button>
        </div>
      </div>
      <div style={{ padding:"14px 16px 0" }}>
        <div style={{ display:"flex", gap:10, alignItems:"center", marginBottom:7 }}>
          <span style={{ fontFamily:mono, fontSize:10, color:"#999999", letterSpacing:2 }}>{task.category.toUpperCase()}</span>
          <DeadlineBadge d={task.deadline}/>
        </div>
        <h2 style={{ fontSize:20, fontWeight:700, margin:"0 0 10px", lineHeight:1.3, letterSpacing:-0.3, color:"#1A1A1A" }}>{task.title}</h2>
        <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:14 }}>
          <div style={{ flex:1, height:2, background:"#D0D0D0" }}>
            <div style={{ height:"100%", width:`${pct*100}%`, background:"#1A1A1A", transition:"width 0.4s" }}/>
          </div>
          <span style={{ fontFamily:mono, fontSize:10, color:"#999999", minWidth:32 }}>{doneN}/{task.subactions.length}</span>
        </div>
        {task.blocker && (
          <div style={{ border:"1px solid #FF2A0044", background:"#FF2A0008", padding:"10px 12px", marginBottom:12 }}>
            <div style={{ fontFamily:mono, fontSize:10, color:"#FF2A00", letterSpacing:2, marginBottom:5 }}>BLOCKER</div>
            <div style={{ fontSize:13, color:"#884433", lineHeight:1.55, marginBottom:tip?8:10 }}>{task.blocker}</div>
            {tip
              ? <div style={{ fontSize:13, color:"#777777", lineHeight:1.55, borderTop:"1px solid #FF2A0022", paddingTop:8 }}><span style={{ fontFamily:mono, color:"#FFB800", fontSize:10 }}>→ </span>{tip}</div>
              : <button onClick={getAdvice} disabled={aiLoading} style={{ background:"transparent", border:"1px solid #FF2A0055", color:"#FF2A00", padding:"6px 12px", fontSize:11, cursor:"pointer", fontFamily:mono, letterSpacing:2 }}>{aiLoading?"PROCESSING...":"UNBLOCK"}</button>
            }
          </div>
        )}
        {(task.involved?.length>0||task.linked?.length>0) && (
          <div style={{ display:"flex", gap:6, flexWrap:"wrap", marginBottom:12 }}>
            {task.involved?.map(i=><span key={i} style={{ fontFamily:mono, fontSize:10, color:"#999999", border:"1px solid #D0D0D0", padding:"2px 6px", letterSpacing:1 }}>↗ {i}</span>)}
            {task.linked?.map(l=><span key={l} style={{ fontFamily:mono, fontSize:10, color:"#999999", border:"1px solid #D0D0D0", padding:"2px 6px", letterSpacing:1 }}>⇌ {l}</span>)}
          </div>
        )}
        <div style={{ fontFamily:mono, fontSize:10, color:"#AAAAAA", letterSpacing:2, marginBottom:8, marginTop:14 }}>STEPS</div>
        {task.subactions.map((s,i)=>(
          <div key={s.id} onClick={()=>onToggle(task.id,s.id)} style={{ display:"flex", gap:12, alignItems:"flex-start", padding:"10px 12px", marginBottom:4, background:"#FFFFFF", border:"1px solid #D0D0D0", cursor:"pointer" }}>
            <div style={{ width:16, height:16, border:"1px solid #CCCCCC", background:s.done?"#CCCCCC":"transparent", flexShrink:0, marginTop:1 }}/>
            <span style={{ fontSize:13, lineHeight:1.5, color:s.done?"#AAAAAA":"#555555", textDecoration:s.done?"line-through":"none" }}>
              <span style={{ fontFamily:mono, color:"#CCCCCC", marginRight:8, fontSize:10 }}>{String(i+1).padStart(2,"0")}</span>{s.text}
            </span>
          </div>
        ))}
        {(pct===1 || task.done) && (
          <div style={{ marginTop:16, marginBottom:32 }}>
            <div style={{ border:"1px solid #D0D0D0", padding:"14px 16px", textAlign:"center", marginBottom:12 }}>
              <div style={{ fontFamily:mono, fontSize:11, color:"#999999", letterSpacing:3 }}>COMPLETE</div>
            </div>
            <button onClick={()=>onDelete(task.id)} style={{ width:"100%", padding:"12px", background:"transparent", border:"1px solid #FF2A0044", color:"#FF2A00", fontSize:11, fontWeight:700, cursor:"pointer", fontFamily:mono, letterSpacing:3 }}>
              DELETE TASK ×
            </button>
          </div>
        )}
      </div>
    </div>
  );
}

function CategorySection({ category, tasks, collapsed, onToggleCollapse, onOpenDetail, onToggleStep, onEditTask }) {
  const openTasks = tasks.filter(t => !t.done);
  const doneCount = tasks.filter(t => t.done).length;
  if (tasks.length === 0) return null;
  const urgencyOrder = {red:0,amber:1,green:2};
  const topUrgency = openTasks.length > 0
    ? openTasks.reduce((b,t)=>urgencyOrder[t.urgency]<urgencyOrder[b.urgency]?t:b, openTasks[0]).urgency
    : "green";
  const u = URGENCY[topUrgency];

  return (
    <div>
      <div onClick={()=>onToggleCollapse(category)} style={{ display:"flex", alignItems:"center", background:"#FFFFFF", cursor:"pointer", borderTop:"1px solid #2A2A2A", borderBottom:collapsed?"none":"1px solid #D0D0D0", padding:"0 14px", minHeight:48 }}>
        <div style={{ flex:1 }}>
          <span style={{ fontFamily:mono, fontSize:12, fontWeight:700, color:openTasks.length>0?"#1A1A1A":"#AAAAAA", letterSpacing:2 }}>{category.toUpperCase()}</span>
        </div>
        <div style={{ display:"flex", alignItems:"center", gap:12 }}>
          {openTasks.length > 0 && (
            <span style={{ fontFamily:mono, fontSize:11, color:"#1A1A1A", border:"1px solid #D0D0D0", width:28, height:28, display:"inline-flex", alignItems:"center", justifyContent:"center", letterSpacing:0, flexShrink:0 }}>
              {openTasks.length}
            </span>
          )}
          {doneCount > 0 && openTasks.length === 0 && <span style={{ fontFamily:mono, fontSize:10, color:"#AAAAAA", letterSpacing:1 }}>DONE</span>}
          <span style={{ fontFamily:mono, fontSize:10, color:"#AAAAAA" }}>{collapsed?"▶":"▼"}</span>
        </div>
      </div>
      {!collapsed && openTasks.sort((a,b)=>{
        const o={red:0,amber:1,green:2};
        if(o[a.urgency]!==o[b.urgency]) return o[a.urgency]-o[b.urgency];
        return (daysUntil(a.deadline)??999)-(daysUntil(b.deadline)??999);
      }).map(task => {
        const doneN = task.subactions.filter(s=>s.done).length;
        const total = task.subactions.length;
        const pct = total ? doneN/total : 0;
        const tu = URGENCY[task.urgency];
        return (
          <div key={task.id} style={{ borderBottom:"1px solid #D0D0D0" }}>
            <div style={{ display:"flex", background:"#FFFFFF" }}>
              <div style={{ width:3, flexShrink:0, background:tu.color, alignSelf:"stretch", marginLeft:3 }}/>
              <div style={{ flex:1, padding:"9px 12px 7px", cursor:"pointer" }} onClick={()=>onOpenDetail(task.id)}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", gap:8, marginBottom:3 }}>
                  <span style={{ fontSize:14, fontWeight:600, color:"#333333", lineHeight:1.3, flex:1 }}>{task.title}</span>
                  <div style={{ display:"flex", gap:6, alignItems:"center", flexShrink:0 }}>
                    {task.blocker && <span style={{ fontFamily:mono, fontSize:10, color:"#FF2A00", letterSpacing:1 }}>BLK</span>}
                  </div>
                </div>
                {total > 0 && (
                  <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                    <div style={{ flex:1, height:1, background:"#D0D0D0" }}>
                      <div style={{ height:"100%", width:`${pct*100}%`, background:"#1A1A1A", transition:"width 0.4s" }}/>
                    </div>
                    <span style={{ fontFamily:mono, fontSize:10, color:"#AAAAAA" }}>{doneN}/{total}</span>
                  </div>
                )}
              </div>
              <div style={{ display:"flex", alignItems:"center", justifyContent:"center", borderLeft:"1px solid #2A2A2A", padding:"0 8px", flexShrink:0, width:72 }}>
                {task.deadline ? (
                  <span style={{ fontFamily:mono, fontSize:10, color:"#1A1A1A", letterSpacing:0.3, textAlign:"center" }}>
                    {(()=>{ const d=daysUntil(task.deadline); return d===null?"":d<0?`${Math.abs(d)} days over`:d===0?"today":`${d} days`; })()}
                  </span>
                ) : null}
              </div>
            </div>
            {task.subactions.map((s,sIdx)=>(
              <div key={s.id} onClick={()=>onToggleStep(task.id,s.id)} style={{ display:"flex", gap:10, alignItems:"flex-start", padding:"7px 14px 7px 22px", background:"#FFFFFF", cursor:"pointer" }}>
                <div style={{ width:12, height:12, border:"1px solid #252525", background:s.done?"#CCCCCC":"transparent", flexShrink:0, marginTop:2 }}/>
                <span style={{ fontSize:13, lineHeight:1.55, color:s.done?"#C0C0C0":"#909090", textDecoration:s.done?"line-through":"none" }}>
                  <span style={{ fontFamily:mono, color:"#CCCCCC", marginRight:6, fontSize:10 }}>{String(sIdx+1).padStart(2,"0")}</span>{s.text}
                </span>
              </div>
            ))}
          </div>
        );
      })}
      {!collapsed && tasks.filter(t=>t.done).map(task => (
        <div key={task.id} style={{ display:"flex", borderBottom:"1px solid #D0D0D0", opacity:0.4 }}>
          <div style={{ width:3, flexShrink:0, background:"#CCCCCC", alignSelf:"stretch", marginLeft:3 }}/>
          <div style={{ flex:1, padding:"8px 12px", cursor:"pointer" }} onClick={()=>onOpenDetail(task.id)}>
            <span style={{ fontSize:13, color:"#AAAAAA", textDecoration:"line-through" }}>{task.title}</span>
          </div>
          <button onClick={e=>{e.stopPropagation();onEditTask(task);}} style={{ background:"transparent", border:"none", borderLeft:"1px solid #D0D0D0", color:"#CCCCCC", padding:"0 12px", cursor:"pointer", fontFamily:mono, fontSize:14, flexShrink:0 }}>x</button>
        </div>
      ))}
    </div>
  );
}

function SplashScreen({ onEnter, urgentTasks, onCompleteStep }) {
  const [phase, setPhase] = useState(0); // 0=intro, 1=dropping, 2=subtask, 3=celebrate
  const [dotVisible, setDotVisible] = useState(false);
  const [cursorVisible, setCursorVisible] = useState(false);
  const [typing, setTyping] = useState(false);
  const [textVisible, setTextVisible] = useState(0);
  const [taskIndex, setTaskIndex] = useState(0);
  const [taskVisible, setTaskVisible] = useState(false);
  const [swipeX, setSwipeX] = useState(0);
  const [swiping, setSwiping] = useState(false);
  const [crossedOut, setCrossedOut] = useState(false);
  const [flyOff, setFlyOff] = useState(0);
  // Celebrate typing
  const [celebText, setCelebText] = useState(0);
  const [celebReady, setCelebReady] = useState(false);
  const touchStartX = useRef(0);
  const chars = ["D","o","\u00A0","O","n","e","\u00A0","T","h","i","n","g"];
  const celebChars = ["D","o","\u00A0","O","n","e","\u00A0","M","o","r","e"];

  useEffect(() => {
    const t = setTimeout(() => setDotVisible(true), 500);
    return () => clearTimeout(t);
  }, []);
  useEffect(() => {
    if (!dotVisible) return;
    const t = setTimeout(() => setCursorVisible(true), 900);
    return () => clearTimeout(t);
  }, [dotVisible]);
  useEffect(() => {
    if (!cursorVisible) return;
    const t = setTimeout(() => setTyping(true), 700);
    return () => clearTimeout(t);
  }, [cursorVisible]);
  useEffect(() => {
    if (!typing || phase !== 0 || textVisible >= chars.length) return;
    const ch = chars[textVisible];
    const delay = ch === "\u00A0" ? 300 : 75 + Math.random() * 65;
    const t = setTimeout(() => setTextVisible(v => v + 1), delay);
    return () => clearTimeout(t);
  }, [typing, textVisible, phase]);

  // Celebrate typing effect
  useEffect(() => {
    if (phase !== 3) return;
    if (celebText >= celebChars.length) { setCelebReady(true); return; }
    const ch = celebChars[celebText];
    const delay = ch === "\u00A0" ? 300 : 75 + Math.random() * 65;
    const t = setTimeout(() => setCelebText(v => v + 1), delay);
    return () => clearTimeout(t);
  }, [phase, celebText]);

  // Build urgent subtask list — snapshot in a ref so it stays stable during animations
  const urgentSubtasks = [];
  urgentTasks.forEach(task => {
    const nextSub = task.subactions.find(s => !s.done);
    if (nextSub) urgentSubtasks.push({ sub: nextSub, task });
  });
  const urgentSubtasksRef = useRef(urgentSubtasks);
  useEffect(() => { urgentSubtasksRef.current = urgentSubtasks; }, [urgentTasks]);

  function startCelebration() {
    setPhase(3);
    setCelebText(0);
    setCelebReady(false);
  }

  function handleCelebTap() {
    if (!celebReady) return;
    setPhase(2);
    setTaskVisible(false);
    setTimeout(() => {
      const len = urgentSubtasksRef.current.length;
      setTaskIndex(i => len > 0 ? (i + 1) % len : 0);
      setTaskVisible(true);
    }, 200);
  }

  function handleDotPress() {
    if (phase === 0 && dotVisible) {
      setPhase(1);
      setTaskVisible(false);
      setTimeout(() => {
        setPhase(2);
        setTimeout(() => setTaskVisible(true), 200);
      }, 2600);
    } else if (phase === 2) {
      onEnter(null);
    } else if (phase === 3 && celebReady) {
      handleCelebTap();
    }
  }

  function handleTouchStart(e) {
    touchStartX.current = e.touches[0].clientX;
    setSwiping(true);
    setFlyOff(0);
  }

  function handleTouchMove(e) {
    const dx = e.touches[0].clientX - touchStartX.current;
    setSwipeX(dx);
    if (dx > 40) setCrossedOut(true);
    else setCrossedOut(false);
  }

  function handleTouchEnd() {
    const dx = swipeX;
    setSwiping(false);

    if (dx > 60) {
      // Swipe right → complete step, fly off right
      setFlyOff(1);
      const list = urgentSubtasksRef.current;
      const item = list[taskIndex];
      const completedSubId = item ? item.sub.id : null;
      const remainingCount = item
        ? item.task.subactions.filter(s => !s.done && s.id !== completedSubId).length
        : 0;
      if (item) onCompleteStep(item.task.id, item.sub.id);
      setTimeout(() => {
        setFlyOff(0);
        setSwipeX(0);
        setCrossedOut(false);
        setTaskVisible(false);
        setTimeout(() => {
          if (remainingCount === 0) {
            startCelebration();
          } else {
            setTaskVisible(true);
          }
        }, 150);
      }, 420);
    } else if (dx < -60) {
      // Swipe left → fly off left, next urgent task
      setFlyOff(-1);
      setTimeout(() => {
        setFlyOff(0);
        setSwipeX(0);
        setCrossedOut(false);
        setTaskVisible(false);
        setTimeout(() => {
          const len = urgentSubtasksRef.current.length;
          setTaskIndex(i => len > 0 ? (i + 1) % len : 0);
          setTaskVisible(true);
        }, 150);
      }, 420);
    } else {
      setSwipeX(0);
      setCrossedOut(false);
    }
  }

  function handleTaskTap() {
    if (phase !== 2 || !urgentSubtasks[taskIndex]) return;
    onEnter(urgentSubtasks[taskIndex].task);
  }

  const typingDone = textVisible >= chars.length;
  const currentItem = urgentSubtasks[taskIndex] || null;
  const u = currentItem ? URGENCY[currentItem.task.urgency] : null;

  return (
    <div style={{ position:"fixed", inset:0, background:"#FFFFFF", zIndex:500, maxWidth:430, margin:"0 auto" }}>
      <style>{`
        @keyframes dotIn {
          from { opacity:0; transform:translateX(-50%) translateY(-50%) scale(0.3); }
          to   { opacity:1; transform:translateX(-50%) translateY(-50%) scale(1); }
        }
        @keyframes dropBounce {
          0%   { transform:translateX(-50%) translateY(-50%);   animation-timing-function:cubic-bezier(0.55,0,1,0.45); }
          40%  { transform:translateX(-50%) translateY(38vh);   animation-timing-function:cubic-bezier(0,0.55,0.45,1); }
          54%  { transform:translateX(-50%) translateY(16vh);   animation-timing-function:cubic-bezier(0.55,0,1,0.45); }
          65%  { transform:translateX(-50%) translateY(38vh);   animation-timing-function:cubic-bezier(0,0.55,0.45,1); }
          75%  { transform:translateX(-50%) translateY(26vh);   animation-timing-function:cubic-bezier(0.55,0,1,0.45); }
          83%  { transform:translateX(-50%) translateY(38vh);   animation-timing-function:cubic-bezier(0,0.55,0.45,1); }
          90%  { transform:translateX(-50%) translateY(32vh);   animation-timing-function:cubic-bezier(0.55,0,1,0.45); }
          95%  { transform:translateX(-50%) translateY(38vh);   animation-timing-function:cubic-bezier(0,0.55,0.45,1); }
          98%  { transform:translateX(-50%) translateY(35vh);   animation-timing-function:cubic-bezier(0.55,0,1,0.45); }
          100% { transform:translateX(-50%) translateY(38vh); }
        }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
      `}</style>

      {/* DOT — always visible after phase 1 settles */}
      <div onClick={handleDotPress} style={{
        position:"absolute", left:"50%", top:"50%",
        transform: phase >= 2 ? "translateX(-50%) translateY(38vh)" : "translateX(-50%) translateY(-50%)",
        width:56, height:56, borderRadius:"50%",
        background:"#1A1A1A",
        opacity: dotVisible ? 1 : 0,
        animation: dotVisible && phase === 0 ? "dotIn 0.7s cubic-bezier(0.34,1.56,0.64,1) forwards"
                 : phase === 1 ? "dropBounce 2.6s linear forwards" : "none",
        cursor: dotVisible ? "pointer" : "default",
        userSelect:"none",
        boxShadow:"0 4px 24px rgba(0,0,0,0.12)",
        zIndex:10,
        willChange:"transform",
      }}/>

      {/* Typing text — intro phase 0 */}
      {phase === 0 && (
        <div style={{ position:"absolute", bottom:"18%", left:0, right:0, textAlign:"center" }}>
          <span style={{ display:"inline-block", position:"relative", fontSize:22, fontWeight:700, letterSpacing:-0.5, fontFamily:"'Helvetica Neue',Helvetica,Arial,sans-serif", color:"#1A1A1A" }}>
            <span style={{ visibility:"hidden" }}>Do One Thing</span>
            <span style={{ position:"absolute", left:0, top:0, whiteSpace:"nowrap" }}>
              {chars.map((ch, i) => (
                <span key={i} style={{ opacity: i < textVisible ? 1 : 0 }}>{ch}</span>
              ))}
              {cursorVisible && !typingDone && (
                <span style={{ display:"inline-block", width:2, height:"0.85em", background:"#1A1A1A", marginLeft:2, verticalAlign:"text-bottom", animation: typing ? "blink 0.65s step-end infinite" : "none" }}/>
              )}
            </span>
          </span>
        </div>
      )}

      {/* Celebration — task complete, type Do One Thing again */}
      {phase === 3 && (
        <div onClick={handleCelebTap} style={{ position:"absolute", top:0, left:0, right:0, bottom:0, display:"flex", alignItems:"center", justifyContent:"center", flexDirection:"column", cursor: celebReady ? "pointer" : "default" }}>
          <span style={{ display:"inline-block", position:"relative", fontSize:22, fontWeight:700, letterSpacing:-0.5, fontFamily:"'Helvetica Neue',Helvetica,Arial,sans-serif", color:"#1A1A1A" }}>
            <span style={{ visibility:"hidden" }}>Do One More</span>
            <span style={{ position:"absolute", left:0, top:0, whiteSpace:"nowrap" }}>
              {celebChars.map((ch, i) => (
                <span key={i} style={{ opacity: i < celebText ? 1 : 0 }}>{ch}</span>
              ))}
              {!celebReady && (
                <span style={{ display:"inline-block", width:2, height:"0.85em", background:"#1A1A1A", marginLeft:2, verticalAlign:"text-bottom", animation:"blink 0.65s step-end infinite" }}/>
              )}
            </span>
          </span>
        </div>
      )}

      {/* Subtask card */}
      {phase === 2 && currentItem && (
        <div
          onClick={handleTaskTap}
          onTouchStart={handleTouchStart}
          onTouchMove={handleTouchMove}
          onTouchEnd={handleTouchEnd}
          style={{
            position:"absolute", left:32, right:32, top:"50%",
            transform: flyOff !== 0
              ? `translateY(-50%) translateX(${flyOff * 120}vw) rotate(${flyOff * 8}deg)`
              : `translateY(-50%) translateX(${swiping ? swipeX * 0.5 : 0}px) rotate(${swiping ? swipeX * 0.03 : 0}deg)`,
            opacity: flyOff !== 0 ? 0 : taskVisible ? 1 : 0,
            transition: flyOff !== 0
              ? "transform 0.42s cubic-bezier(0.4,0,1,1), opacity 0.35s ease"
              : swiping ? "none" : "opacity 0.35s ease, transform 0.3s cubic-bezier(0.25,0.46,0.45,0.94)",
            cursor:"pointer",
            userSelect:"none",
          }}>
          <div style={{ borderTop:"1px solid #1A1A1A", borderBottom:"1px solid #1A1A1A", padding:"20px 0" }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:10 }}>
              <span style={{ fontFamily:mono, fontSize:10, color:"#AAAAAA", letterSpacing:2 }}>{currentItem.task.category.toUpperCase()}</span>
              <span style={{ fontFamily:mono, fontSize:10, color:u.color, letterSpacing:1 }}>{u.label}</span>
            </div>
            <div style={{ fontSize:13, color:"#AAAAAA", lineHeight:1.4, marginBottom:8, fontFamily:mono, letterSpacing:0.5 }}>{currentItem.task.title}</div>
            <div style={{ fontSize:17, fontWeight:600, color:"#1A1A1A", lineHeight:1.4, textDecoration: crossedOut ? "line-through" : "none", transition:"text-decoration 0.15s" }}>{currentItem.sub.text}</div>
          </div>
        </div>
      )}
    </div>
  );
}
function AnimatedTitle() {
  const [visibleCount, setVisibleCount] = useState(0);
  const [started, setStarted] = useState(false);
  const chars = ["D","o","\u00A0","O","n","e","\u00A0","T","h","i","n","g"];
  const total = chars.length;

  useEffect(() => {
    const t = setTimeout(() => setStarted(true), 600);
    return () => clearTimeout(t);
  }, []);

  useEffect(() => {
    if (!started || visibleCount >= total) return;
    const ch = chars[visibleCount];
    const delay = ch === "\u00A0" ? 300 : 80 + Math.random() * 70;
    const t = setTimeout(() => setVisibleCount(v => v + 1), delay);
    return () => clearTimeout(t);
  }, [started, visibleCount]);

  const done = visibleCount >= total;

  return (
    <span style={{ display:"inline-block", position:"relative", whiteSpace:"nowrap" }}>
      {/* Ghost layer — full text always occupies space, invisible */}
      <span style={{ visibility:"hidden", letterSpacing:-0.5 }}>Do One Thing</span>
      {/* Typed layer — sits exactly on top */}
      <span style={{ position:"absolute", left:0, top:0, letterSpacing:-0.5, whiteSpace:"nowrap" }}>
        {chars.map((ch, i) => (
          <span key={i} style={{ opacity: i < visibleCount ? 1 : 0 }}>{ch}</span>
        ))}
        {started && !done && (
          <span style={{
            display:"inline-block", width:2, height:"0.85em",
            background:"#1A1A1A", marginLeft:1, verticalAlign:"text-bottom",
            animation:"blink 0.7s step-end infinite",
          }}/>
        )}
      </span>
      <style>{`@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}`}</style>
    </span>
  );
}

function App() {
  const [tasks, setTasks] = useState(() => {
    try {
      const saved = localStorage.getItem('dot_tasks');
      return saved ? JSON.parse(saved) : INITIAL_TASKS;
    } catch(e) { return INITIAL_TASKS; }
  });
  const [splash, setSplash] = useState(true);
  const [categories, setCategories] = useState(() => {
    try {
      const saved = localStorage.getItem('dot_categories');
      return saved ? JSON.parse(saved) : DEFAULT_CATEGORIES;
    } catch(e) { return DEFAULT_CATEGORIES; }
  });
  const [cat, setCat] = useState("All");
  const [urgencyFilter, setUrgencyFilter] = useState(null);
  const [detailId, setDetailId] = useState(null);
  const [modalTask, setModalTask] = useState(null);
  const [collapsed, setCollapsed] = useState(Object.fromEntries(DEFAULT_CATEGORIES.map(c=>[c,true])));

  // Persist tasks and categories to localStorage whenever they change
  useEffect(() => {
    try { localStorage.setItem('dot_tasks', JSON.stringify(tasks)); } catch(e) {}
  }, [tasks]);

  useEffect(() => {
    try { localStorage.setItem('dot_categories', JSON.stringify(categories)); } catch(e) {}
  }, [categories]);

  function toggleCollapse(c) { setCollapsed(p=>({...p,[c]:!p[c]})); }
  function toggleUrgency(u) { setUrgencyFilter(p => p===u ? null : u); }

  function toggleStep(tid, sid) {
    setTasks(prev => prev.map(t => {
      if (t.id!==tid) return t;
      const subs = t.subactions.map(s=>s.id===sid?{...s,done:!s.done}:s);
      return {...t, subactions:subs, done:subs.every(s=>s.done)};
    }));
  }

  function completeStep(tid, sid) {
    setTasks(prev => prev.map(t => {
      if (t.id!==tid) return t;
      const subs = t.subactions.map(s=>s.id===sid?{...s,done:true}:s);
      return {...t, subactions:subs, done:subs.every(s=>s.done)};
    }));
  }

  function saveTask(saved) {
    setTasks(prev => {
      const exists = prev.find(t=>t.id===saved.id);
      if (exists) return prev.map(t=>t.id===saved.id?saved:t);
      return [...prev, saved];
    });
    setModalTask(null);
    if (!tasks.find(t=>t.id===saved.id)) setCat(saved.category);
  }

  function deleteTask(id) {
    setTasks(prev=>prev.filter(t=>t.id!==id));
    setModalTask(null);
    setDetailId(null);
  }

  function renameTaskCategory(oldName, newName) {
    setTasks(prev => prev.map(t => t.category===oldName ? {...t, category:newName} : t));
    if (cat === oldName) setCat(newName);
  }

  const allOpen = tasks.filter(t=>!t.done);
  const urgentTasks = [...allOpen].sort((a,b)=>{const o={red:0,amber:1,green:2};return o[a.urgency]-o[b.urgency]||(daysUntil(a.deadline)??999)-(daysUntil(b.deadline)??999)});

  if (splash) {
    return (
      <div style={{ fontFamily:"'Helvetica Neue',Helvetica,Arial,sans-serif", background:"#FFFFFF", minHeight:"100vh", maxWidth:430, margin:"0 auto" }}>
        <style>{`@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');::-webkit-scrollbar{display:none}*{-webkit-tap-highlight-color:transparent}`}</style>
        <SplashScreen
          urgentTasks={urgentTasks}
          onCompleteStep={(tid, sid) => completeStep(tid, sid)}
          onEnter={(task) => {
            setSplash(false);
            if (task) {
              setCat(task.category);
              setDetailId(task.id);
            }
          }}
        />
      </div>
    );
  }
  const counts = { red:allOpen.filter(t=>t.urgency==="red").length, amber:allOpen.filter(t=>t.urgency==="amber").length, green:allOpen.filter(t=>t.urgency==="green").length };
  const doneTotal = tasks.filter(t=>t.done).length;

  // Apply both category and urgency filters
  const filteredOpen = allOpen
    .filter(t => cat==="All" || t.category===cat)
    .filter(t => !urgencyFilter || t.urgency===urgencyFilter)
    .sort((a,b)=>{
      const o={red:0,amber:1,green:2};
      if(o[a.urgency]!==o[b.urgency]) return o[a.urgency]-o[b.urgency];
      return (daysUntil(a.deadline)??999)-(daysUntil(b.deadline)??999);
    });

  const topTask = allOpen.sort((a,b)=>{const o={red:0,amber:1,green:2};return o[a.urgency]-o[b.urgency];})[0];
  const coach = topTask
    ? counts.red>0 ? `${counts.red} URGENT. NEXT: ${topTask.title.toUpperCase()}. DO STEP 01 ONLY.`
    : `NO CRITICAL ITEMS. FOCUS: ${topTask.title.toUpperCase()}.`
    : "ALL CLEAR. ADD A NEW ACTION.";

  if (detailId && !modalTask) {
    return (
      <div style={{ fontFamily:"'Helvetica Neue',Helvetica,Arial,sans-serif", background:"#FFFFFF", minHeight:"100vh", maxWidth:430, margin:"0 auto", color:"#1A1A1A" }}>
        <style>{`@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');::-webkit-scrollbar{display:none}*{-webkit-tap-highlight-color:transparent}`}</style>
        <DetailView taskId={detailId} tasks={tasks} onBack={()=>setDetailId(null)} onToggle={toggleStep} onEdit={t=>setModalTask(t)} onDelete={id=>{deleteTask(id);setDetailId(null);}}/>
        {modalTask && <TaskModal task={modalTask==="new"?null:modalTask} defaultCat={cat==="All"?"Work":cat} categories={categories} onCategoriesChange={setCategories} onRenameCategory={renameTaskCategory} allTasks={tasks} onSave={saved=>{saveTask(saved);setDetailId(saved.id);}} onDelete={deleteTask} onClose={()=>setModalTask(null)}/>}
      </div>
    );
  }

  return (
    <div style={{ fontFamily:"'Helvetica Neue',Helvetica,Arial,sans-serif", background:"#FFFFFF", minHeight:"100vh", maxWidth:430, margin:"0 auto", color:"#1A1A1A", paddingBottom:80 }}>
      <style>{`@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');::-webkit-scrollbar{display:none}*{-webkit-tap-highlight-color:transparent}`}</style>

      {/* HEADER */}
      <div style={{ padding:"52px 16px 0", borderBottom:"1px solid #2A2A2A", position:"sticky", top:0, background:"#FFFFFF", zIndex:50 }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:12 }}>
          <div>
            <div style={{ fontFamily:mono, fontSize:10, color:"#AAAAAA", letterSpacing:3, marginBottom:5 }}>{new Date().toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric"}).toUpperCase()}</div>
            <div style={{ fontSize:23, fontWeight:700, letterSpacing:-0.5, color:"#1A1A1A", lineHeight:1 }}>
              <AnimatedTitle/>
            </div>
          </div>
          <div style={{ fontFamily:mono, textAlign:"right" }}>
            <div style={{ fontSize:10, color:"#AAAAAA", letterSpacing:2, marginBottom:5 }}>TOTAL</div>
            <div style={{ fontSize:23, fontWeight:700, color:"#1A1A1A", lineHeight:1 }}>{tasks.filter(t=>!t.done).length}</div>
          </div>
        </div>

        {/* Scoreboard — tappable urgency filters */}
        <div style={{ display:"flex", borderTop:"1px solid #2A2A2A" }}>
          {[["red","URG"],["amber","SOON"],["green","PLAN"]].map(([k,l],i)=>{
            const active = urgencyFilter===k;
            return (
              <button key={k} onClick={()=>toggleUrgency(k)} style={{
                flex:1, padding:"8px 0", textAlign:"center",
                borderRight:i<2?"1px solid #2A2A2A":"none",
                background: active ? URGENCY[k].bg : "transparent",
                border:"none", borderRight:i<2?"1px solid #2A2A2A":"none",
                borderBottom: active ? `2px solid ${URGENCY[k].color}` : "2px solid transparent",
                cursor:"pointer", fontFamily:mono,
              }}>
                <div style={{ fontSize:20, fontWeight:700, color:active?URGENCY[k].color:URGENCY[k].color, lineHeight:1, opacity:active?1:0.5 }}>{counts[k]}</div>
                <div style={{ fontSize:10, color:active?URGENCY[k].color:"#AAAAAA", letterSpacing:2, marginTop:3 }}>{l}</div>
              </button>
            );
          })}
        </div>

        {/* Category tabs */}
        <div style={{ display:"flex", overflowX:"auto", marginLeft:-16, marginRight:-16, borderTop:"1px solid #2A2A2A", borderBottom:"1px solid #2A2A2A" }}>
          {["All",...categories].map(c=>{
            const cnt = c==="All"
              ? allOpen.filter(t=>!urgencyFilter||t.urgency===urgencyFilter).length
              : allOpen.filter(t=>t.category===c&&(!urgencyFilter||t.urgency===urgencyFilter)).length;
            const active = cat===c;
            return (
              <button key={c} onClick={()=>setCat(c)} style={{ background:"transparent", borderRight:"1px solid #2A2A2A", borderTop:"none", borderLeft:"none", borderBottom:"none", color:active?"#1A1A1A":"#AAAAAA", padding:"9px 12px", fontSize:10, fontWeight:active?900:400, cursor:"pointer", fontFamily:mono, letterSpacing:1.5, whiteSpace:"nowrap", flexShrink:0 }}>
                {c==="All"?"ALL":(CAT_ICONS[c] || c.slice(0,3).toUpperCase())}<br/>
                <span style={{ fontSize:12, letterSpacing:0, color:active?"#1A1A1A":"#CCCCCC", fontWeight:active?900:400 }}>{cnt}</span>
              </button>
            );
          })}
          <button onClick={()=>setModalTask("new")} style={{ background:"transparent", border:"none", color:"#FFB800", padding:"9px 14px", fontSize:16, cursor:"pointer", fontFamily:mono, whiteSpace:"nowrap", flexShrink:0 }}>+</button>
        </div>

      </div>

      {/* ALL VIEW — grouped by category, each filtered */}
      {cat==="All" && (
        <div>
          {categories.map(category=>{
            const catTasksAll = tasks.filter(t=>t.category===category&&(!urgencyFilter||t.urgency===urgencyFilter||t.done));
            if (catTasksAll.length===0) return null;
            return <CategorySection key={category} category={category} tasks={catTasksAll} collapsed={!!collapsed[category]} onToggleCollapse={toggleCollapse} onOpenDetail={setDetailId} onToggleStep={toggleStep} onEditTask={t=>setModalTask(t)}/>;
          })}
          {filteredOpen.length===0 && (
            <div style={{ padding:"32px 16px", textAlign:"center" }}>
              <div style={{ fontFamily:mono, fontSize:10, color:"#CCCCCC", letterSpacing:3 }}>NO TASKS MATCH THIS FILTER</div>
            </div>
          )}
        </div>
      )}

      {/* SINGLE CATEGORY VIEW — same expanded layout as All view */}
      {cat!=="All" && (
        <div>
          {filteredOpen.length===0 && (
            <div style={{ padding:"32px 16px", textAlign:"center" }}>
              <div style={{ fontFamily:mono, fontSize:10, color:"#CCCCCC", letterSpacing:3, marginBottom:14 }}>
                {urgencyFilter ? "NO TASKS MATCH THIS FILTER" : "SECTION CLEAR"}
              </div>
              {!urgencyFilter && <button onClick={()=>setModalTask("new")} style={{ background:"transparent", border:"1px solid #D0D0D0", color:"#1A1A1A", padding:"10px 20px", fontSize:11, fontWeight:700, cursor:"pointer", fontFamily:mono, letterSpacing:3 }}>+ ADD ACTION</button>}
            </div>
          )}
          {filteredOpen.map(task => {
            const doneN = task.subactions.filter(s=>s.done).length;
            const total = task.subactions.length;
            const pct = total ? doneN/total : 0;
            const u = URGENCY[task.urgency];
            return (
              <div key={task.id} style={{ borderBottom:"1px solid #D0D0D0" }}>
                {/* Task header row */}
                <div style={{ display:"flex", background:"#FFFFFF" }}>
                  <div style={{ width:3, flexShrink:0, background:u.color, alignSelf:"stretch", marginLeft:3 }}/>
                  <div style={{ flex:1, padding:"9px 12px 7px", cursor:"pointer" }} onClick={()=>setDetailId(task.id)}>
                    <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", gap:8, marginBottom:3 }}>
                      <span style={{ fontSize:14, fontWeight:600, color:"#222222", lineHeight:1.3, flex:1 }}>{task.title}</span>
                      <div style={{ display:"flex", gap:6, alignItems:"center", flexShrink:0 }}>
                        {task.blocker && <span style={{ fontFamily:mono, fontSize:10, color:"#FF2A00", letterSpacing:1 }}>BLK</span>}
                      </div>
                    </div>
                    {total > 0 && (
                      <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                        <div style={{ flex:1, height:1, background:"#D0D0D0" }}>
                          <div style={{ height:"100%", width:`${pct*100}%`, background:"#1A1A1A", transition:"width 0.4s" }}/>
                        </div>
                        <span style={{ fontFamily:mono, fontSize:10, color:"#AAAAAA" }}>{doneN}/{total}</span>
                      </div>
                    )}
                  </div>
                  {/* Days column */}
                  <div style={{ display:"flex", alignItems:"center", justifyContent:"center", borderLeft:"1px solid #D0D0D0", padding:"0 8px", flexShrink:0, width:72 }}>
                    {task.deadline ? (
                      <span style={{ fontFamily:mono, fontSize:10, color:"#1A1A1A", letterSpacing:0.3, textAlign:"center" }}>
                        {(()=>{ const d=daysUntil(task.deadline); return d===null?"":d<0?`${Math.abs(d)} days over`:d===0?"today":`${d} days`; })()}
                      </span>
                    ) : null}
                  </div>
                </div>
                {/* Subactions — same as All view */}
                {task.subactions.map((s, sIdx) => (
                  <div key={s.id} onClick={()=>toggleStep(task.id, s.id)}
                    style={{ display:"flex", gap:10, alignItems:"flex-start", padding:"7px 14px 7px 22px", background:"#FFFFFF", cursor:"pointer" }}>
                    <div style={{ width:12, height:12, border:`1px solid ${s.done?"#CCCCCC":"#CCCCCC"}`, background:s.done?"#CCCCCC":"transparent", flexShrink:0, marginTop:2 }}/>
                    <span style={{ fontSize:13, lineHeight:1.55, color:s.done?"#CCCCCC":"#777777", textDecoration:s.done?"line-through":"none" }}>
                      <span style={{ fontFamily:mono, color:"#CCCCCC", marginRight:6, fontSize:10 }}>{String(sIdx+1).padStart(2,"0")}</span>{s.text}
                    </span>
                  </div>
                ))}
              </div>
            );
          })}
          {!urgencyFilter && tasks.filter(t=>t.done&&t.category===cat).length>0&&(
            <>
              <div style={{ fontFamily:mono, fontSize:10, color:"#CCCCCC", letterSpacing:3, padding:"14px 16px 8px", borderTop:"1px solid #D0D0D0" }}>COMPLETED</div>
              {tasks.filter(t=>t.done&&t.category===cat).map(task=>(
                <div key={task.id} style={{ display:"flex", borderBottom:"1px solid #D0D0D0", opacity:0.35, cursor:"pointer" }} onClick={()=>setDetailId(task.id)}>
                  <div style={{ flex:1, padding:"8px 12px 8px 16px", display:"flex", alignItems:"center", gap:8 }}>
                    <span style={{ fontFamily:mono, fontSize:10, color:"#AAAAAA" }}>■</span>
                    <span style={{ fontSize:13, color:"#AAAAAA", textDecoration:"line-through" }}>{task.title}</span>
                  </div>
                </div>
              ))}
            </>
          )}
        </div>
      )}

      {modalTask && <TaskModal task={modalTask==="new"?null:modalTask} defaultCat={cat==="All"?"Work":cat} categories={categories} onCategoriesChange={setCategories} onRenameCategory={renameTaskCategory} allTasks={tasks} onSave={saveTask} onDelete={deleteTask} onClose={()=>setModalTask(null)}/>}
    </div>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));

  </script>
</body>
</html>
